<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen – Vacay Cabin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --vc-primary: #2B7A4B;
      --vc-primary-dark: #1E5A36;
      --vc-primary-light: #E8F3EC;
      --vc-accent: #7B5EA7;
      --vc-accent-light: #EEEAF5;
      --vc-bg: #F5F4F1;
      --vc-text: #1A2B20;
      --vc-text-secondary: #637168;
      --vc-text-tertiary: #94A09A;
      --vc-border: #DFDDD8;
      --vc-border-subtle: #EEECE7;
      --vc-red: #C44A35;
      --vc-font-display: 'Lora', Georgia, serif;
      --vc-font-body: 'Plus Jakarta Sans', -apple-system, sans-serif;
      --vc-font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--vc-font-body);
      background: var(--vc-bg);
      color: var(--vc-text);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
      position: relative; overflow: hidden;
    }
    /* Decorative background circles */
    body::before {
      content: '';
      position: fixed; top: -120px; right: -80px;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(43,122,75,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; bottom: -100px; left: -60px;
      width: 350px; height: 350px; border-radius: 50%;
      background: radial-gradient(circle, rgba(123,94,167,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    ::selection { background: var(--vc-primary-light); color: var(--vc-primary-dark); }

    .brand-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, var(--vc-primary-dark), var(--vc-primary));
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 4px 16px rgba(43,122,75,0.25);
    }
    .brand {
      font-family: var(--vc-font-display);
      font-size: 1.4rem; font-weight: 600; color: var(--vc-text);
      letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .brand-sub {
      font-size: .82rem; color: var(--vc-text-tertiary);
      margin-bottom: 2rem; text-align: center;
    }

    .card {
      background: white; border-radius: 18px;
      box-shadow: 0 4px 24px rgba(26,43,32,0.08), 0 1px 4px rgba(26,43,32,0.04);
      border: 1px solid var(--vc-border-subtle);
      padding: 2rem 2.25rem 2.25rem;
      width: 100%; max-width: 400px;
      position: relative; z-index: 1;
    }
    .card h2 {
      font-family: var(--vc-font-display);
      font-size: 1.15rem; font-weight: 600; color: var(--vc-text);
      margin-bottom: 1.5rem; text-align: center;
    }

    label {
      display: block; font-size: .82rem; font-weight: 600;
      color: var(--vc-text); margin-bottom: .4rem;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%; padding: .7rem .9rem;
      border: 1.5px solid var(--vc-border);
      border-radius: 10px; font-size: .95rem;
      color: var(--vc-text); background: #fff;
      font-family: var(--vc-font-body);
      outline: none; transition: border-color .18s, box-shadow .18s;
      margin-bottom: 1.1rem;
    }
    input:focus {
      border-color: var(--vc-primary);
      box-shadow: 0 0 0 3px rgba(43,122,75,0.1);
    }
    input::placeholder { color: var(--vc-text-tertiary); }

    button[type="submit"] {
      width: 100%; padding: .8rem 1rem;
      background: linear-gradient(135deg, var(--vc-primary-dark), var(--vc-primary));
      color: #fff; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      font-family: var(--vc-font-body);
      transition: opacity .18s;
      margin-top: .25rem;
      box-shadow: 0 2px 8px rgba(43,122,75,0.25);
    }
    button[type="submit"]:hover { opacity: .9; }
    button[type="submit"]:disabled { opacity: .5; cursor: not-allowed; }

    .spinner-wrap {
      display: none; justify-content: center; margin-top: .5rem;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid var(--vc-border);
      border-top-color: var(--vc-primary);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      display: none;
      background: #FDF0ED; border: 1px solid rgba(196,74,53,0.2);
      border-radius: 10px; color: var(--vc-red);
      font-size: .85rem; padding: .7rem 1rem;
      margin-top: 1rem; line-height: 1.4;
    }

    .footer-note {
      margin-top: 1.5rem; font-size: .78rem;
      color: var(--vc-text-tertiary); text-align: center;
      position: relative; z-index: 1;
    }
    .footer-note a {
      color: var(--vc-accent); text-decoration: none; font-weight: 500;
    }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="brand-icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-.3a1 1 0 0 1-.7-1.7L9 9h-.2A1 1 0 0 1 8 7.3L12 3l4 4.3a1 1 0 0 1-.8 1.7H15l3 3.3a1 1 0 0 1-.7 1.7H17Z"></path>
      <path d="M12 22v-3"></path>
    </svg>
  </div>
  <div class="brand">Vacay Cabin</div>
  <div class="brand-sub">Privé overzicht · Alleen voor geautoriseerde gebruikers</div>

  <div class="card">
    <h2>Inloggen</h2>
    <form id="login-form" onsubmit="handleLogin(event)">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" placeholder="naam@voorbeeld.nl"
             autocomplete="email" required />

      <label for="password">Wachtwoord</label>
      <input type="password" id="password" placeholder="••••••••"
             autocomplete="current-password" required />

      <button type="submit" id="submit-btn">Inloggen</button>
      <div class="spinner-wrap" id="spinner-wrap">
        <div class="spinner"></div>
      </div>
    </form>

    <div id="error-msg"></div>
  </div>

  <div class="footer-note">Geen account? Neem contact op met de beheerder.</div>
  <div class="footer-note" style="margin-top:.5rem;">
    <a href="#" id="forgot-link">Wachtwoord vergeten?</a>
  </div>

<script>
  const SUPABASE_URL      = "https://nkhwuaiklfpsrrosyyqk.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_x4Sfl5T_3iv9At7JazC2jw_LeDzRq6E";

  const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  (async () => {
    const { data: { session } } = await _sb.auth.getSession();
    if (session) window.location.replace("index.html");
  })();

  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("submit-btn");
    const spinner  = document.getElementById("spinner-wrap");
    const errBox   = document.getElementById("error-msg");

    errBox.style.display = "none";
    btn.disabled         = true;
    spinner.style.display = "flex";

    try {
      const { error } = await _sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      window.location.replace("index.html");
    } catch (err) {
      const msg = mapError(err.message || "");
      errBox.textContent    = msg;
      errBox.style.display  = "block";
      btn.disabled          = false;
      spinner.style.display = "none";
    }
  }

  document.getElementById("forgot-link").onclick = async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    if (!email) {
      alert("Vul eerst je e-mailadres in.");
      return;
    }
    const { error } = await _sb.auth.resetPasswordForEmail(email, {
      redirectTo: "https://mcv13-wp.github.io/vacay-cabin/reset.html"
    });
    if (error) {
      alert("Fout: " + error.message);
    } else {
      alert("Reset-link verstuurd naar " + email + ". Controleer je inbox.");
    }
  };

  function mapError(msg) {
    if (/invalid login|invalid email|wrong password|email not confirmed/i.test(msg))
      return "Ongeldig e-mailadres of wachtwoord.";
    if (/email.*not.*found/i.test(msg))
      return "Dit e-mailadres is niet bekend.";
    if (/too many requests/i.test(msg))
      return "Te veel inlogpogingen. Probeer het over enkele minuten opnieuw.";
    return "Er is een fout opgetreden. Probeer het opnieuw.";
  }
</script>
</body>
</html>
