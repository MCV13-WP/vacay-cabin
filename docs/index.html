<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vakantiewoningen Te Koop</title>
  <style>
    :root {
      --green:   #2d6a4f;
      --green-l: #40916c;
      --accent:  #f4a261;
      --bg:      #f8f9fa;
      --card-bg: #ffffff;
      --text:    #212529;
      --muted:   #6c757d;
      --border:  #dee2e6;
      --radius:  12px;
      --shadow:  0 2px 12px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: var(--bg); color: var(--text); }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-l) 100%);
      color: #fff; padding: 2rem 1.5rem 1.5rem;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { opacity: .85; margin-top: .3rem; font-size: .9rem; }
    #last-updated { font-size: .78rem; opacity: .7; margin-top: .4rem; }

    /* ── Tabs ── */
    .tabs { display: flex; background: var(--green); padding: 0 1.5rem; gap: .25rem; }
    .tab-btn {
      padding: .65rem 1.4rem; border: none; background: transparent;
      color: rgba(255,255,255,.7); cursor: pointer; font-size: .9rem;
      border-bottom: 3px solid transparent; transition: all .2s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: var(--accent); font-weight: 600; }
    .tab-btn:hover  { color: #fff; }

    /* ── Stats bar ── */
    .stats {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: .6rem 1.5rem; font-size: .82rem; color: var(--muted);
      display: flex; gap: 1.5rem; flex-wrap: wrap;
    }
    .stats strong { color: var(--text); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem; padding: 1.5rem; max-width: 1400px; margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
      display: flex; flex-direction: column; transition: transform .2s, box-shadow .2s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,.13); }

    .card-img {
      width: 100%; height: 180px; object-fit: cover; background: var(--border);
    }
    .card-img-placeholder {
      width: 100%; height: 180px; background: linear-gradient(135deg, #e9ecef, #dee2e6);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: #adb5bd;
    }

    .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: .5rem; }

    .badge-source {
      display: inline-block; font-size: .7rem; font-weight: 600; padding: .2rem .55rem;
      border-radius: 20px; background: #e8f5e9; color: var(--green);
      letter-spacing: .03em; text-transform: uppercase;
    }
    .badge-new {
      display: inline-block; font-size: .7rem; font-weight: 700; padding: .2rem .55rem;
      border-radius: 20px; background: var(--accent); color: #fff;
      margin-left: .3rem;
    }

    .card-title { font-size: 1rem; font-weight: 700; line-height: 1.3; }

    .card-price {
      font-size: 1.3rem; font-weight: 800; color: var(--green);
    }
    .card-price span { font-size: .8rem; font-weight: 400; color: var(--muted); }

    .card-specs {
      display: flex; gap: .75rem; font-size: .85rem; color: var(--muted); flex-wrap: wrap;
    }
    .spec { display: flex; align-items: center; gap: .25rem; }

    .card-location { font-size: .82rem; color: var(--muted); display: flex; align-items: center; gap: .3rem; }

    .card-link {
      display: block; margin-top: auto; padding: .6rem 1rem; text-align: center;
      background: var(--green); color: #fff; text-decoration: none;
      border-radius: 8px; font-size: .875rem; font-weight: 600; transition: background .2s;
    }
    .card-link:hover { background: var(--green-l); }

    /* ── Empty state ── */
    .empty {
      grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--muted);
    }
    .empty .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* ── Tab content ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Loading ── */
    #loading {
      text-align: center; padding: 4rem; font-size: 1.1rem; color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid var(--border);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .grid { padding: 1rem; gap: 1rem; }
      header { padding: 1.5rem 1rem 1rem; }
      .tabs  { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏡 Vakantiewoningen Te Koop</h1>
  <p>Recreatiewoningen op vakantieparken · max €350.000 · min 4 slaapkamers · min 8 personen</p>
  <div id="last-updated">Wordt geladen…</div>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('nieuw', this)">⭐ Nieuw</button>
  <button class="tab-btn"       onclick="switchTab('alle',  this)">🏘 Alle woningen</button>
</nav>

<div id="loading">
  <div class="spinner"></div>
  Woningen worden geladen…
</div>

<div id="content" style="display:none">
  <div class="stats" id="stats-bar"></div>

  <div id="tab-nieuw" class="tab-content active">
    <div class="grid" id="grid-nieuw"></div>
  </div>

  <div id="tab-alle" class="tab-content">
    <div class="grid" id="grid-alle"></div>
  </div>
</div>

<script>
  const SOURCE_COLORS = {
    "Recreatievastgoed.nl":   "#2d6a4f",
    "Landal Makelaardij":     "#1565c0",
    "Marktplaats":            "#d32f2f",
    "VakantiehuisTekoop.nl":  "#6a1b9a",
  };

  function fmt_price(p) {
    if (!p) return "Prijs onbekend";
    return "€ " + p.toLocaleString("nl-NL");
  }

  function card_html(l, is_new) {
    const color  = SOURCE_COLORS[l.source] || "#555";
    const price  = fmt_price(l.price);
    const slpk   = l.bedrooms ? `${l.bedrooms} slpk` : "? slpk";
    const pers   = l.persons  ? `${l.persons} pers`  : "? pers";
    const loc    = l.location || l.title || "Onbekend";
    const new_b  = is_new ? `<span class="badge-new">NIEUW</span>` : "";
    const img    = l.image
      ? `<img class="card-img" src="${l.image}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-img-placeholder" style="display:none">🏡</div>`
      : `<div class="card-img-placeholder">🏡</div>`;

    return `
      <div class="card">
        ${img}
        <div class="card-body">
          <div>
            <span class="badge-source" style="background:${color}22;color:${color}">${l.source}</span>
            ${new_b}
          </div>
          <div class="card-title">${l.title}</div>
          <div class="card-price">${price} <span>k.k.</span></div>
          <div class="card-specs">
            <span class="spec">🛏 ${slpk}</span>
            <span class="spec">👥 ${pers}</span>
          </div>
          <div class="card-location">📍 ${loc}</div>
          <a class="card-link" href="${l.url}" target="_blank" rel="noopener">Bekijk woning →</a>
        </div>
      </div>`;
  }

  function switchTab(name, btn) {
    document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    btn.classList.add("active");
  }

  async function load() {
    try {
      const resp = await fetch("data.json?_=" + Date.now());
      if (!resp.ok) throw new Error(resp.status);
      const data = await resp.json();

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";

      const ts = data.generated_at
        ? new Date(data.generated_at).toLocaleString("nl-NL")
        : "onbekend";
      document.getElementById("last-updated").textContent = `Laatste update: ${ts}`;

      const new_urls = new Set((data.new_listings || []).map(l => l.url));
      const all      = data.all_listings || [];
      const nieuw    = all.filter(l => new_urls.has(l.url));

      // Sorteer duur → goedkoop
      const by_price = arr => [...arr].sort((a,b) => (b.price||0) - (a.price||0));

      document.getElementById("stats-bar").innerHTML =
        `<span>⭐ <strong>${nieuw.length}</strong> nieuw deze run</span>` +
        `<span>🏘 <strong>${all.length}</strong> totaal gevonden</span>` +
        `<span>🔄 Gegenereerd: ${ts}</span>`;

      const gn = document.getElementById("grid-nieuw");
      if (nieuw.length === 0) {
        gn.innerHTML = `<div class="empty"><div class="icon">✅</div>
          <strong>Geen nieuwe woningen</strong><br>
          Alle woningen zijn al bekend. Kom morgen terug!</div>`;
      } else {
        gn.innerHTML = by_price(nieuw).map(l => card_html(l, true)).join("");
      }

      const ga = document.getElementById("grid-alle");
      if (all.length === 0) {
        ga.innerHTML = `<div class="empty"><div class="icon">🔍</div>
          <strong>Nog geen woningen</strong><br>
          De scraper heeft nog niet gedraaid.</div>`;
      } else {
        ga.innerHTML = by_price(all).map(l => card_html(l, new_urls.has(l.url))).join("");
      }

    } catch(e) {
      document.getElementById("loading").innerHTML =
        `<div class="icon">⚠️</div>
         <strong>Kon data.json niet laden.</strong><br>
         Controleer of de scraper al een keer gedraaid heeft.<br>
         <small style="color:#aaa">${e}</small>`;
    }
  }

  load();
</script>
</body>
</html>
